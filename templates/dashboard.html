<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DEX — 대시보드</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header><h1>AI DEX 대시보드</h1></header>
    <main>
        <div class="stats">
            <div class="stat-card"><span class="num">{{ total_posts }}</span><span class="label">전체 글</span></div>
            <div class="stat-card indexed"><span class="num">{{ indexed }}</span><span class="label">인덱싱 완료</span></div>
            <div class="stat-card"><span class="num">{{ submitted }}</span><span class="label">제출됨</span></div>
            <div class="stat-card pending"><span class="num">{{ pending }}</span><span class="label">대기 중</span></div>
        </div>

        <h2>관리 블로그</h2>
        <table>
            <tr><th>블로그 ID</th><th>고객명</th><th>상태</th><th>마지막 수집</th></tr>
            {% for blog in blogs %}
            <tr>
                <td><a href="/blog/{{ blog.naver_blog_id }}">{{ blog.naver_blog_id }}</a></td>
                <td>{{ blog.client_name or '-' }}</td>
                <td>{{ blog.status }}</td>
                <td>{{ blog.last_collected_at or '-' }}</td>
            </tr>
            {% endfor %}
        </table>
    </main>
</body>
</html>
